name: sheldra

services:
  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports: ["29092:29092"]
    volumes: [kafka_data:/bitnami/kafka]
    networks: [sheldra]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    networks: [sheldra]
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/change-me}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    ports: ["7474:7474", "7687:7687"]
    volumes: [neo4j_data:/data, neo4j_logs:/logs]
    networks: [sheldra]
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports: ["6333:6333", "6334:6334"]
    volumes: [qdrant_data:/qdrant/storage]
    networks: [sheldra]
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7-alpine
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_TOKEN:-change-me}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-sheldra}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-safety}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-change-me}
    ports: ["8086:8086"]
    volumes: [influxdb_data:/var/lib/influxdb2]
    networks: [sheldra]
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-min-8}
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio_data:/data]
    networks: [sheldra]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sheldra}
      POSTGRES_USER: ${POSTGRES_USER:-sheldra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    networks: [sheldra]
    restart: unless-stopped

networks:
  sheldra:
    driver: bridge

volumes:
  kafka_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  influxdb_data:
  minio_data:
  postgres_data:
