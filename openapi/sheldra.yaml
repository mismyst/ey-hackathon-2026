openapi: 3.0.3
info:
  title: SHELDRA API
  version: 0.1.0
  description: Contract for the SHELDRA Intelligence Engine chat entry point.
servers:
  - url: http://localhost:8000
paths:
  /api/v1/sheldra/chat:
    post:
      operationId: chatWithSheldra
      summary: Send a safety-guidance request to SHELDRA
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChatRequest' }
      responses:
        '200':
          description: Guidance response
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChatResponse' }
        '422': { description: Invalid request }
components:
  schemas:
    ChatRequest:
      type: object
      required: [worker_id, message]
      properties:
        worker_id: { type: string, minLength: 1 }
        message: { type: string, minLength: 1 }
        trace_id: { type: string, format: uuid }
        context:
          type: object
          properties:
            zone_id: { type: string }
            equipment_id: { type: string }
            active_hazard: { type: string }
            metadata: { type: object, additionalProperties: true }
    ChatResponse:
      type: object
      required: [response, avatar_command, confidence, trace_id, citations, timestamp]
      properties:
        response: { type: string }
        confidence: { type: number, minimum: 0, maximum: 1 }
        trace_id: { type: string, format: uuid }
        timestamp: { type: string, format: date-time }
        citations:
          type: array
          items:
            type: object
            required: [document]
            properties:
              document: { type: string }
              section: { type: string }
              page: { type: integer, minimum: 1 }
        avatar_command:
          type: object
          required: [gesture, tone]
          properties:
            gesture: { type: string, enum: [idle, nod, point, warning] }
            tone: { type: string, enum: [calm, normal, urgent, praise] }
